<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Flowstra | AI-driven Business Growth Systems</title>
    <meta name="title" content="Flowstra | AI-driven Business Growth Systems" />
    <meta name="description" content="Founder-led AI systems that automate lead qualification, routing, and CRM logic for scaling businesses." />
    
    <!-- Progressive Web App Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flowstra" />
    <link rel="manifest" href="/manifest.json" />

    <link rel="canonical" href="https://flowstra.org/" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "Flowstra",
          "url": "https://flowstra.org"
        },
        {
          "@type": "Organization",
          "name": "Flowstra",
          "url": "https://flowstra.org",
          "logo": "https://flowstra.org/logo.svg",
          "sameAs": ["https://www.instagram.com/flowstra.ai"]
        }
      ]
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Flowstra" />
    <meta property="og:url" content="https://flowstra.org/" />
    <meta property="og:title" content="Flowstra | AI-driven Business Growth Systems" />
    <meta property="og:description" content="Transform your business with AI-powered lead generation and growth systems. Get 24/7 automated sales processes that work while you sleep." />
    <meta property="og:image" content="https://flowstra.org/logo.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://flowstra.org/" />
    <meta property="twitter:title" content="Flowstra | AI-driven Business Growth Systems" />
    <meta property="twitter:description" content="Transform your business with AI-powered lead generation and growth systems. Get 24/7 automated sales processes that work while you sleep." />
    <meta property="twitter:image" content="https://flowstra.org/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('ServiceWorker registered successfully with scope: ', registration.scope);
            })
            .catch((error) => {
              console.error('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
  </body>
</html>
