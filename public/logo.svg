<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Dark deep blue background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02081f" />
      <stop offset="50%" stop-color="#00020a" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Subtle blue center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f2a66" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Drop shadow for the glowing lines -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" />
  <circle cx="200" cy="200" r="180" fill="url(#centerGlow)" />

  <!-- Hamburger Menu Lines -->
  <!-- Top Line -->
  <rect x="100" y="125" width="200" height="30" rx="15" fill="#ffffff" filter="url(#glow)" />
  
  <!-- Middle Line -->
  <rect x="100" y="185" width="200" height="30" rx="15" fill="#ffffff" filter="url(#glow)" />
  
  <!-- Bottom Line -->
  <rect x="100" y="245" width="200" height="30" rx="15" fill="#3a4153" opacity="0.6" />
</svg>
